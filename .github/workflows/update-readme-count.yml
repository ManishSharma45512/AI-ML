name: Update Notebook Count

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Count completed notebooks/scripts
        id: count
        run: |
          # Recursively counts every .py and .ipynb file in the repo (excludes README, assets, workflows)
          COUNT=$(find . -type f \( -name "*.py" -o -name "*.ipynb" \) | wc -l)
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"

      - name: Update README badge + stats table
        run: |
          COUNT=${{ steps.count.outputs.count }}
          sed -i "s|<!--NOTEBOOK_COUNT-->.*<!--END_NOTEBOOK_COUNT-->|<!--NOTEBOOK_COUNT-->${COUNT}<!--END_NOTEBOOK_COUNT-->|g" README.md

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "chore: auto-update notebook count [skip ci]"
          git push
